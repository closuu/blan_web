<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - blan website</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
</head>

<body>

    <!-- Mobile nav toggle -->
    <button id="nav-toggle" aria-label="Toggle navigation"><span></span><span></span><span></span></button>
    <div id="nav-overlay"></div>
    <header>
        <h1>blan web - login</h1>
    </header>

    <div class="container">
        <aside>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="register.html">Registration</a></li>
            </ul>
            <button id="theme-toggle">Toggle Monochrome</button>
        </aside>

        <main>
            <h2>Login</h2>
            <p id="auth-message" style="color: #ff3366; margin-bottom: 16px; min-height: 20px;"></p>

            <form id="login-form" action="#">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit">Login</button>
            </form>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 - gonda Appdev Lab</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/script.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async(e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const msg = document.getElementById('auth-message');

            msg.style.color = '#ff3366';
            msg.textContent = 'Logging in...';

            const {
                data,
                error
            } = await sb.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                msg.textContent = error.message;
                return;
            }

            // Check role → redirect accordingly
            const {
                data: profile
            } = await sb
                .from('profiles')
                .select('role')
                .eq('id', data.user.id)
                .single();

            if (profile?.role === 'admin') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'user.html';
            }
        });
    </script>
    <script>
        (function () {
            var toggle  = document.getElementById('nav-toggle');
            var overlay = document.getElementById('nav-overlay');
            var sidebar = document.querySelector('aside');
            if (!toggle || !sidebar) return;

            function openNav()  {
                toggle.classList.add('open');
                sidebar.classList.add('open');
                overlay.classList.add('open');
                document.body.style.overflow = 'hidden';
            }
            function closeNav() {
                toggle.classList.remove('open');
                sidebar.classList.remove('open');
                overlay.classList.remove('open');
                document.body.style.overflow = '';
            }

            toggle.addEventListener('click', function () {
                sidebar.classList.contains('open') ? closeNav() : openNav();
            });
            overlay.addEventListener('click', closeNav);

            // Close sidebar when any nav link is tapped
            sidebar.querySelectorAll('a').forEach(function (a) {
                a.addEventListener('click', closeNav);
            });
        })();
    </script>
</body>

</html>
